<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;overflow-x:hidden}

/* Loading / error */
#loading{position:fixed;inset:0;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:900}
.spinner{width:26px;height:26px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error{display:none;padding:24px;text-align:center;max-width:500px;margin:40px auto;background:#fef2f2;border:1px solid #fecaca;border-radius:8px}
#error h2{font-size:15px;color:#991b1b;margin-bottom:8px}
#error p{font-size:12px;color:#64748b;line-height:1.5}

/* App chrome */
#app{display:none;flex-direction:column;min-height:100vh}
#header{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:20}
#header h1{font-size:14px;font-weight:700;color:#0f172a}
.filter-group{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.search-box{flex:1;max-width:320px;min-width:200px;position:relative}
.search-box input{width:100%;height:30px;padding:0 10px 0 30px;border:1px solid #e2e8f0;border-radius:5px;font-size:12px;font-family:inherit;color:#1e293b;background:#fff;outline:none}
.search-box input:focus{border-color:#3b82f6}
.search-box svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#94a3b8}
.filter-pill{height:28px;padding:0 10px;border:1px solid #e2e8f0;border-radius:14px;background:#fff;cursor:pointer;font-size:11px;font-weight:500;color:#475569;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap}
.filter-pill:hover{background:#f8fafc}
.filter-pill.active{background:#0f172a;color:#fff;border-color:#0f172a}
.filter-pill .count{font-size:10px;opacity:.7}
#totals{display:flex;gap:6px;align-items:center}
.total-chip{background:#f1f5f9;padding:5px 10px;border-radius:5px;font-size:11px;color:#475569;display:flex;gap:6px;align-items:center}
.total-chip b{color:#0f172a;font-weight:700}
.total-chip.good b{color:#15803d}
.total-chip.bad b{color:#b91c1c}

/* Grid layout */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:16px}

/* Job card */
.job-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;cursor:pointer;transition:box-shadow .15s,transform .1s;position:relative}
.job-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);transform:translateY(-1px)}
.job-card.border-good{border-left:3px solid #22c55e}
.job-card.border-warn{border-left:3px solid #f97316}
.job-card.border-bad{border-left:3px solid #ef4444}
.job-card.border-neutral{border-left:3px solid #cbd5e1}

.job-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.job-name{font-size:13px;font-weight:600;color:#0f172a;line-height:1.3;flex:1}
.job-status{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0;white-space:nowrap}
.job-status.good{background:#dcfce7;color:#15803d}
.job-status.warn{background:#ffedd5;color:#c2410c}
.job-status.bad{background:#fee2e2;color:#b91c1c}
.job-status.neutral{background:#f1f5f9;color:#64748b}

.job-meta{display:flex;gap:12px;font-size:10px;color:#64748b;margin-bottom:8px;flex-wrap:wrap}
.job-meta .type{color:#475569;font-weight:500}

.job-numbers{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;padding-top:8px;border-top:1px solid #f1f5f9}
.job-num-cell{display:flex;flex-direction:column}
.job-num-label{font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px;margin-bottom:1px}
.job-num-value{font-size:12px;font-weight:600;color:#0f172a;font-variant-numeric:tabular-nums}

.job-progress{height:5px;background:#f1f5f9;border-radius:3px;overflow:hidden;position:relative}
.job-progress-fill{height:100%;border-radius:3px;transition:width .3s}
.job-progress-fill.good{background:#22c55e}
.job-progress-fill.warn{background:#f97316}
.job-progress-fill.bad{background:#ef4444}
.job-progress-label{display:flex;justify-content:space-between;font-size:9px;color:#94a3b8;margin-top:3px}

.job-creatives{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.creative-tag{font-size:9px;background:#f1f5f9;color:#475569;padding:1px 6px;border-radius:3px;font-weight:500}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:#94a3b8;font-size:13px;grid-column:1/-1}

/* Detail panel (copied/adapted from calendar) */
#panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:500}
#panel{position:fixed;top:0;right:-560px;bottom:0;width:540px;max-width:100vw;background:#f8fafc;box-shadow:-6px 0 28px rgba(0,0,0,.12);z-index:501;display:flex;flex-direction:column;transition:right .22s cubic-bezier(.4,0,.2,1);overflow:hidden}
#panel.open{right:0}
#panel-head{padding:16px 22px 12px;border-bottom:1px solid #e2e8f0;background:#fff;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-shrink:0}
#panel-title{font-size:16px;font-weight:700;color:#0f172a;line-height:1.3}
#panel-x{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:22px;line-height:1;padding:0;flex-shrink:0}
#panel-x:hover{color:#475569}
#panel-body{flex:1;overflow-y:auto;padding:18px 22px}

/* Panel content (same as budget-tracker) */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sum-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px}
.sum-label{font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sum-value{font-size:16px;font-weight:700;color:#0f172a;line-height:1.1}
.sum-sub{font-size:9px;color:#94a3b8;margin-top:2px}
.sum-card.good{border-color:#86efac;background:#f0fdf4}
.sum-card.good .sum-value{color:#15803d}
.sum-card.warn{border-color:#fdba74;background:#fff7ed}
.sum-card.warn .sum-value{color:#c2410c}
.sum-card.bad{border-color:#fca5a5;background:#fef2f2}
.sum-card.bad .sum-value{color:#b91c1c}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:16px 18px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;color:#0f172a;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.card-title .badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.badge-good{background:#dcfce7;color:#15803d}
.badge-warn{background:#ffedd5;color:#c2410c}
.badge-bad{background:#fee2e2;color:#b91c1c}
.badge-neutral{background:#f1f5f9;color:#64748b}

.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:9px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.field-value{font-size:13px;font-weight:600;color:#1e293b}
.field-value.muted{color:#94a3b8;font-weight:500}
.field input{height:32px;padding:0 10px;border:1px solid #e2e8f0;border-radius:5px;font-size:12px;font-family:inherit;color:#1e293b;background:#fff;outline:none;font-weight:600;text-align:right}
.field input:focus{border-color:#3b82f6}
.field-hint{font-size:9px;color:#94a3b8;margin-top:2px}

.creative-list{display:flex;flex-direction:column;gap:8px}
.creative-row{border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;background:#fafbfc}
.creative-row.combined{background:#f0f9ff;border-color:#bae6fd}
.creative-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.creative-name{font-size:12px;font-weight:700;color:#0f172a}
.creative-rate{font-size:10px;color:#64748b;font-weight:500}
.creative-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.creative-cell{display:flex;flex-direction:column;gap:2px}
.cell-label{font-size:8px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.3px}
.cell-value{font-size:12px;font-weight:600;color:#1e293b;font-variant-numeric:tabular-nums}
.cell-value input{height:28px;padding:0 7px;border:1px solid #e2e8f0;border-radius:4px;font-size:11px;font-family:inherit;color:#1e293b;background:#fff;outline:none;font-weight:600;text-align:right;width:100%}
.cell-value input:focus{border-color:#3b82f6}

.progress-wrap{margin-top:10px}
.progress-label{display:flex;justify-content:space-between;align-items:baseline;font-size:9px;color:#64748b;margin-bottom:3px}
.progress-label strong{font-size:10px;color:#0f172a}
.progress-bar{height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-fill.good{background:linear-gradient(90deg,#22c55e,#16a34a)}
.progress-fill.warn{background:linear-gradient(90deg,#f59e0b,#d97706)}
.progress-fill.bad{background:linear-gradient(90deg,#ef4444,#dc2626)}

.empty-state{text-align:center;padding:24px 16px;color:#94a3b8;font-size:12px}

#save-indicator{position:fixed;bottom:16px;right:16px;background:#0f172a;color:#fff;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:500;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
#save-indicator.show{opacity:1}
#save-indicator.error{background:#dc2626}

@media (max-width: 640px) {
  .summary{grid-template-columns:repeat(2,1fr)}
  .field-grid{grid-template-columns:1fr}
  .creative-grid{grid-template-columns:repeat(2,1fr)}
  #panel{width:100vw;right:-100vw}
}
</style>
</head>

<script>
'use strict';
var $ = function(id){ return document.getElementById(id); };

// ── Creative rates ──────────────────────────────────────────
var CREATIVE_RATES = {
  'MARGO': 195,'LISA': 195,'BRETT': 250,
  'COPYWRITING': 230,'ANDREW': 380,'LINDSEY': 380
};
var AUTO_ESTIMATES = {
  'Billboard': 8,'Branding Materials': 8,'EDM': 4,'Front of House': 8,
  'Key Art': 8,'Show Flyers': 8,'Programmatic Assets': 4,'Radio Ad': 2,
  'Social Misc': 2,'Social Static Assets': 2,'Social Video (Under 90 secs)': 3,
  'Social Video (Over 90 secs)': 5,'Out of Home': 8,'Web Banners/Tiles': 4,'Vox Pops': 8
};

// ── State ───────────────────────────────────────────────────
var allBoardCols = [];
var allItems = [];
var colMap = {};
var saveTimers = {};
var currentFilter = 'all';
var searchTerm = '';

function showError(title, msg) {
  $('loading').style.display = 'none';
  $('error').style.display = 'block';
  $('err-title').textContent = title;
  $('err-msg').textContent = msg;
}
function setMsg(t) { $('load-msg').textContent = t; }

// ── API ─────────────────────────────────────────────────────
function api(query) {
  return fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': CONFIG.apiToken, 'API-Version': '2024-01' },
    body: JSON.stringify({ query: query })
  }).then(function(r) {
    if (!r.ok) throw new Error('monday.com HTTP ' + r.status);
    return r.json();
  }).then(function(j) {
    if (j.errors && j.errors.length) throw new Error(j.errors[0].message);
    return j.data;
  });
}

function fetchColumns() {
  return api('{ boards(ids:[' + CONFIG.boardId + ']) { columns { id title type } } }')
    .then(function(d) {
      var cols = d && d.boards && d.boards[0] && d.boards[0].columns;
      if (!cols || !cols.length) throw new Error('Board not found');
      return cols;
    });
}

function fetchItems() {
  return api('{ boards(ids:[' + CONFIG.boardId + ']) { items_page(limit:500) { items { id name column_values { id value text } } } } }')
    .then(function(d) { return (d && d.boards && d.boards[0] && d.boards[0].items_page && d.boards[0].items_page.items) || []; });
}

function fetchSingleItem(itemId) {
  return api('{ items(ids:[' + itemId + ']) { id name column_values { id value text } } }')
    .then(function(d) { return (d && d.items && d.items[0]) || null; });
}

function updateCol(itemId, columnId, value) {
  var v = JSON.stringify(String(value));
  return api('mutation { change_simple_column_value(item_id:' + itemId + ', board_id:' + CONFIG.boardId + ', column_id:"' + columnId + '", value:' + v + ') { id } }');
}

// ── Column mapping ─────────────────────────────────────────
function mapCols(cols) {
  var find = function(patterns) {
    for (var i = 0; i < patterns.length; i++) {
      var p = patterns[i];
      var c = cols.find(function(col) { return p.test(col.title); });
      if (c) return c.id;
    }
    return '';
  };
  return {
    budget:           find([/^budget$/i, /total.*budget/i, /^budget\s/i]),
    creative1:        find([/creative\s*1|^creative$/i]),
    creative2:        find([/creative\s*2/i]),
    contentType:      find([/content.?type|creative.?type|job.?type/i]),
    estimateHours:    find([/^estimated?\s*hours|auto.*estimate/i]),
    overrideHours:    find([/override.*hours|manual.*hours|custom.*hours/i]),
    creative1Set:     find([/creative\s*1.*set.*hours|creative\s*1\s*hours$/i, /set.*hours.*1/i]),
    creative2Set:     find([/creative\s*2.*set.*hours|creative\s*2\s*hours$/i, /set.*hours.*2/i]),
    timeTracking:     find([/^time.?track|actual.*time|tracked.*time/i]),
    creative1Tracked: find([/creative\s*1.*tracked|tracked.*1/i]),
    creative2Tracked: find([/creative\s*2.*tracked|tracked.*2/i])
  };
}

// ── Parse item ─────────────────────────────────────────────
function parseItem(raw) {
  var cv = raw.column_values || [];
  var getText = function(colId) {
    if (!colId) return '';
    var c = cv.find(function(x){ return x.id === colId; });
    return c ? (c.text || '').trim() : '';
  };
  var getNum = function(colId) {
    var t = getText(colId); var n = parseFloat(t);
    return isNaN(n) ? 0 : n;
  };
  var getNumOrNull = function(colId) {
    var t = getText(colId); if (!t) return null;
    var n = parseFloat(t); return isNaN(n) ? null : n;
  };
  var getTimeHours = function(colId) {
    if (!colId) return null;
    var c = cv.find(function(x){ return x.id === colId; });
    if (!c || !c.value) return getNumOrNull(colId);
    try {
      var v = JSON.parse(c.value);
      if (v && typeof v === 'object') {
        if (typeof v.duration === 'number') return v.duration / 3600;
        if (Array.isArray(v.additional_value)) {
          var total = v.additional_value.reduce(function(sum, e) {
            return sum + (parseInt(e.ended_at||0, 10) - parseInt(e.started_at||0, 10));
          }, 0);
          return total / 3600;
        }
      }
    } catch(e) {}
    var t = (c.text || '').trim();
    var hm = t.match(/^(\d+):(\d+)/);
    if (hm) return parseInt(hm[1], 10) + parseInt(hm[2], 10) / 60;
    return getNumOrNull(colId);
  };

  var out = {
    id: raw.id, name: raw.name, _cv: cv,
    budget:           getNum(colMap.budget),
    creative1:        getText(colMap.creative1),
    creative2:        getText(colMap.creative2),
    contentType:      getText(colMap.contentType),
    estimateHours:    getNumOrNull(colMap.estimateHours),
    overrideHours:    getNumOrNull(colMap.overrideHours),
    creative1Set:     getNumOrNull(colMap.creative1Set),
    creative2Set:     getNumOrNull(colMap.creative2Set),
    creative1Tracked: getTimeHours(colMap.creative1Tracked),
    creative2Tracked: getTimeHours(colMap.creative2Tracked),
    totalTracked:     getTimeHours(colMap.timeTracking)
  };

  if (out.estimateHours === null && out.contentType && AUTO_ESTIMATES[out.contentType]) {
    out.estimateHours = AUTO_ESTIMATES[out.contentType];
  }

  // Compute derived fields for card display & filtering
  var eff = out.overrideHours !== null ? out.overrideHours : out.estimateHours;
  var c1Rate = CREATIVE_RATES[(out.creative1 || '').toUpperCase()] || 0;
  var c2Rate = CREATIVE_RATES[(out.creative2 || '').toUpperCase()] || 0;
  var c1Set = out.creative1Set, c2Set = out.creative2Set;
  if (c1Set === null && c2Set === null && eff !== null) {
    if (out.creative1 && out.creative2) { c1Set = eff/2; c2Set = eff/2; }
    else if (out.creative1) c1Set = eff;
  }
  out._effEstimate   = eff;
  out._c1Rate        = c1Rate;
  out._c2Rate        = c2Rate;
  out._c1Set         = c1Set;
  out._c2Set         = c2Set;
  out._estCost       = (c1Set||0) * c1Rate + (c2Set||0) * c2Rate;
  // Handle single-creative case for tracked cost
  var c1T = out.creative1Tracked, c2T = out.creative2Tracked;
  if (!c1T && !c2T && out.totalTracked && out.creative1 && !out.creative2) c1T = out.totalTracked;
  out._trackedHrs    = (c1T || 0) + (c2T || 0) || out.totalTracked || 0;
  out._trackedCost   = (c1T || 0) * c1Rate + (c2T || 0) * c2Rate;
  if (!out._trackedCost && out.totalTracked && out.creative1 && !out.creative2) {
    out._trackedCost = out.totalTracked * c1Rate;
  }
  out._remaining     = out.budget - out._trackedCost;

  // Health: combine quote health + live health into one status
  out._health = computeHealth(out);

  return out;
}

function computeHealth(item) {
  if (item.budget <= 0) return 'neutral';
  // If tracking started, prioritize live health
  if (item._trackedCost > 0) {
    var useRatio = item._trackedCost / item.budget;
    if (useRatio > 1) return 'bad';
    if (useRatio > 0.85) return 'warn';
    return 'good';
  }
  // Otherwise look at quote
  if (item._estCost > 0) {
    var estRatio = item._estCost / item.budget;
    if (estRatio > 1.05) return 'bad';
    if (estRatio > 0.9) return 'warn';
    return 'good';
  }
  return 'neutral';
}

// ── Format helpers ─────────────────────────────────────────
function fmt$(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return '$' + Math.round(n).toLocaleString('en-AU');
}
function fmtH(n, d) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  var dec = d === undefined ? 1 : d;
  return n.toFixed(dec).replace(/\.0$/, '') + 'h';
}
function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n) || !isFinite(n)) return '—';
  return Math.round(n) + '%';
}
function esc(s) {
  return String(s === null || s === undefined ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render board view ──────────────────────────────────────
function renderBoard() {
  var grid = $('grid');
  grid.innerHTML = '';

  // Update counts
  var counts = { all: allItems.length, good: 0, warn: 0, bad: 0, neutral: 0, unset: 0 };
  allItems.forEach(function(it) {
    counts[it._health]++;
    if (!it.budget || it.budget <= 0) counts.unset++;
  });
  $('c-all').textContent = counts.all;
  $('c-good').textContent = counts.good;
  $('c-warn').textContent = counts.warn;
  $('c-bad').textContent = counts.bad;
  $('c-unset').textContent = counts.unset;

  // Totals strip
  var filteredForTotals = allItems.filter(function(it){ return it.budget > 0; });
  var totalBudget = filteredForTotals.reduce(function(s,i){ return s + i.budget; }, 0);
  var totalEst = filteredForTotals.reduce(function(s,i){ return s + i._estCost; }, 0);
  var totalTracked = filteredForTotals.reduce(function(s,i){ return s + i._trackedCost; }, 0);
  $('totals').innerHTML =
    '<div class="total-chip">Total budget <b>' + fmt$(totalBudget) + '</b></div>' +
    '<div class="total-chip">Est. cost <b>' + fmt$(totalEst) + '</b></div>' +
    '<div class="total-chip ' + (totalTracked > totalBudget ? 'bad' : 'good') + '">Tracked <b>' + fmt$(totalTracked) + '</b></div>';

  // Apply filter + search
  var shown = allItems.filter(function(it) {
    if (currentFilter === 'unset') return !it.budget || it.budget <= 0;
    if (currentFilter !== 'all' && it._health !== currentFilter) return false;
    if (searchTerm && !it.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
    return true;
  });

  if (!shown.length) {
    grid.innerHTML = '<div class="empty">No jobs match the current filter.</div>';
    return;
  }

  // Sort: bad first (most urgent), then warn, then good, then neutral
  var order = { bad: 0, warn: 1, good: 2, neutral: 3 };
  shown.sort(function(a,b) {
    var d = order[a._health] - order[b._health];
    if (d !== 0) return d;
    return a.name.localeCompare(b.name);
  });

  shown.forEach(function(it) {
    grid.appendChild(buildJobCard(it));
  });
}

function buildJobCard(item) {
  var card = document.createElement('div');
  card.className = 'job-card border-' + item._health;
  card.addEventListener('click', function() { openPanel(item.id); });

  var pct = item.budget > 0 ? (item._trackedCost / item.budget) * 100 : 0;
  var showProgress = item.budget > 0;

  var statusLabel = ({
    good: 'On track', warn: 'Watch', bad: 'Over', neutral: 'No budget'
  })[item._health];

  var html = '';
  html += '<div class="job-head">';
  html += '<div class="job-name">' + esc(item.name) + '</div>';
  html += '<div class="job-status ' + item._health + '">' + statusLabel + '</div>';
  html += '</div>';

  if (item.contentType) {
    html += '<div class="job-meta"><span class="type">' + esc(item.contentType) + '</span>';
    if (item._effEstimate !== null) html += '<span>' + fmtH(item._effEstimate) + ' est.</span>';
    html += '</div>';
  }

  html += '<div class="job-numbers">';
  html += '<div class="job-num-cell"><div class="job-num-label">Budget</div><div class="job-num-value">' + fmt$(item.budget) + '</div></div>';
  html += '<div class="job-num-cell"><div class="job-num-label">Est.</div><div class="job-num-value">' + fmt$(item._estCost) + '</div></div>';
  html += '<div class="job-num-cell"><div class="job-num-label">Tracked</div><div class="job-num-value">' + fmt$(item._trackedCost) + '</div></div>';
  html += '</div>';

  if (showProgress) {
    html += '<div class="job-progress"><div class="job-progress-fill ' + item._health + '" style="width:' + Math.min(pct, 100) + '%"></div></div>';
    html += '<div class="job-progress-label"><span>' + fmtPct(pct) + ' spent</span><span>' + fmt$(item._remaining) + ' left</span></div>';
  }

  if (item.creative1 || item.creative2) {
    html += '<div class="job-creatives">';
    if (item.creative1) html += '<span class="creative-tag">' + esc(item.creative1) + '</span>';
    if (item.creative2) html += '<span class="creative-tag">' + esc(item.creative2) + '</span>';
    html += '</div>';
  }

  card.innerHTML = html;
  return card;
}

// ── Detail panel ───────────────────────────────────────────
function openPanel(itemId) {
  $('panel-title').textContent = '...';
  $('panel-body').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:32px;"><div class="spinner"></div><span style="font-size:11px;color:#94a3b8;">Loading...</span></div>';
  $('panel-overlay').style.display = 'block';
  $('panel').classList.add('open');

  fetchSingleItem(itemId).then(function(raw) {
    if (!raw) { $('panel-body').innerHTML = '<p style="padding:16px;color:#ef4444;">Item not found</p>'; return; }
    // Update local cached item
    var localIdx = allItems.findIndex(function(i){ return i.id === itemId; });
    if (localIdx >= 0) allItems[localIdx] = parseItem(raw);
    renderDetail(parseItem(raw));
  }).catch(function(e) {
    $('panel-body').innerHTML = '<p style="padding:16px;color:#ef4444;">' + esc(e.message) + '</p>';
  });
}

function closePanel() {
  $('panel-overlay').style.display = 'none';
  $('panel').classList.remove('open');
}

function renderDetail(item) {
  $('panel-title').textContent = item.name;
  var pb = $('panel-body');
  pb.innerHTML = '';

  var quoteHealth = 'neutral', quoteLabel = 'No estimate';
  if (item._estCost > 0 && item.budget > 0) {
    var r = item._estCost / item.budget;
    if (r <= 0.9) { quoteHealth = 'good'; quoteLabel = 'Under budget'; }
    else if (r <= 1.05) { quoteHealth = 'warn'; quoteLabel = 'At budget'; }
    else { quoteHealth = 'bad'; quoteLabel = 'Over budget'; }
  }
  var liveHealth = 'neutral', liveLabel = 'Not started';
  if (item._trackedCost > 0 && item.budget > 0) {
    var u = item._trackedCost / item.budget;
    if (u <= 0.7) { liveHealth = 'good'; liveLabel = 'On track'; }
    else if (u <= 0.95) { liveHealth = 'warn'; liveLabel = 'Watch closely'; }
    else { liveHealth = 'bad'; liveLabel = 'Over budget'; }
  }
  var hoursRemaining = item._effEstimate !== null ? item._effEstimate - item._trackedHrs : null;

  var html = '';

  // Summary
  html += '<div class="summary">';
  html += sumCard('Budget', fmt$(item.budget), item.contentType || '—', 'neutral');
  html += sumCard('Est. cost', fmt$(item._estCost), item._effEstimate !== null ? fmtH(item._effEstimate) + ' @ set rates' : 'Not set', quoteHealth);
  html += sumCard('Tracked', fmt$(item._trackedCost), fmtH(item._trackedHrs, 1) + ' logged', liveHealth);
  html += sumCard('Remaining', fmt$(item._remaining), hoursRemaining !== null ? fmtH(hoursRemaining, 1) + ' left' : '', item._remaining < 0 ? 'bad' : item._remaining < item.budget * 0.2 ? 'warn' : 'good');
  html += '</div>';

  // Quote card
  html += '<div class="card">';
  html += '<div class="card-title">Quote Check <span class="badge badge-' + quoteHealth + '">' + quoteLabel + '</span></div>';
  html += '<div class="field-grid">';
  html += field('Budget', fmt$(item.budget), 'muted');
  html += field('Content type', item.contentType || '—', item.contentType ? '' : 'muted');
  html += fieldInput('Auto-estimate', item.estimateHours, 'estimateHours', item.id, 'hrs', item.contentType && AUTO_ESTIMATES[item.contentType] ? 'From ' + item.contentType : 'Enter manually');
  html += fieldInput('Override hours', item.overrideHours, 'overrideHours', item.id, 'hrs', 'Blank = use auto-estimate');
  html += '</div>';
  if (item._effEstimate !== null && item.budget > 0) {
    var pct = (item._estCost / item.budget) * 100;
    html += '<div class="progress-wrap">';
    html += '<div class="progress-label"><span>Estimated cost vs budget</span><strong>' + fmt$(item._estCost) + ' / ' + fmt$(item.budget) + ' (' + fmtPct(pct) + ')</strong></div>';
    html += '<div class="progress-bar"><div class="progress-fill ' + quoteHealth + '" style="width:' + Math.min(pct, 100) + '%"></div></div>';
    html += '</div>';
  }
  html += '</div>';

  // Creatives
  html += '<div class="card">';
  html += '<div class="card-title">Creatives &amp; Hours <span class="badge badge-' + liveHealth + '">' + liveLabel + '</span></div>';
  html += '<div class="creative-list">';
  if (item.creative1) html += creativeRow(1, item.creative1, item._c1Rate, item.budget > 0 ? item.budget / item._c1Rate : null, item._c1Set, item.creative1Tracked, item.id);
  if (item.creative2) html += creativeRow(2, item.creative2, item._c2Rate, item.budget > 0 ? item.budget / item._c2Rate : null, item._c2Set, item.creative2Tracked, item.id);
  if (!item.creative1 && !item.creative2) html += '<div class="empty-state">No creatives assigned yet.</div>';
  if (item.creative1 && item.creative2) {
    html += combinedRow(item._c1Set, item._c2Set, (item._c1Set||0)*item._c1Rate, (item._c2Set||0)*item._c2Rate, item.creative1Tracked, item.creative2Tracked, (item.creative1Tracked||0)*item._c1Rate, (item.creative2Tracked||0)*item._c2Rate, item.budget);
  }
  html += '</div></div>';

  pb.innerHTML = html;

  // Wire inputs
  pb.querySelectorAll('input[data-col]').forEach(function(inp) {
    inp.addEventListener('change', function() {
      var colKey = inp.getAttribute('data-col');
      var id = inp.getAttribute('data-item');
      saveField(id, colKey, inp.value.trim());
    });
  });
}

function sumCard(label, value, sub, health) {
  return '<div class="sum-card ' + health + '"><div class="sum-label">' + esc(label) + '</div><div class="sum-value">' + value + '</div>' + (sub ? '<div class="sum-sub">' + esc(sub) + '</div>' : '') + '</div>';
}
function field(label, value, cls) {
  return '<div class="field"><div class="field-label">' + esc(label) + '</div><div class="field-value ' + (cls||'') + '">' + esc(value) + '</div></div>';
}
function fieldInput(label, value, colKey, itemId, suffix, hint) {
  var v = value === null || value === undefined ? '' : value;
  return '<div class="field"><div class="field-label">' + esc(label) + '</div>' +
    '<input type="number" step="0.25" min="0" value="' + esc(v) + '" data-col="' + colKey + '" data-item="' + itemId + '" placeholder="' + esc(suffix) + '">' +
    (hint ? '<div class="field-hint">' + esc(hint) + '</div>' : '') + '</div>';
}

function creativeRow(n, name, rate, maxHours, setHours, trackedHours, itemId) {
  var setCost = (setHours || 0) * rate;
  var trackedCost = (trackedHours || 0) * rate;
  return '<div class="creative-row"><div class="creative-head">' +
    '<div class="creative-name">' + esc(name) + '</div>' +
    '<div class="creative-rate">$' + rate + '/hr' + (maxHours !== null ? ' · max ' + fmtH(maxHours, 1) + ' at budget' : '') + '</div>' +
    '</div><div class="creative-grid">' +
    '<div class="creative-cell"><div class="cell-label">Set hrs</div><div class="cell-value"><input type="number" step="0.25" min="0" value="' + esc(setHours === null || setHours === undefined ? '' : setHours) + '" data-col="creative' + n + 'Set" data-item="' + itemId + '"></div></div>' +
    '<div class="creative-cell"><div class="cell-label">Set cost</div><div class="cell-value">' + fmt$(setCost) + '</div></div>' +
    '<div class="creative-cell"><div class="cell-label">Tracked</div><div class="cell-value">' + fmtH(trackedHours || 0, 1) + '</div></div>' +
    '<div class="creative-cell"><div class="cell-label">Tracked cost</div><div class="cell-value">' + fmt$(trackedCost) + '</div></div>' +
    '</div></div>';
}

function combinedRow(c1Set, c2Set, c1SC, c2SC, c1T, c2T, c1TC, c2TC, budget) {
  var totalSet = (c1Set||0) + (c2Set||0);
  var totalSetCost = c1SC + c2SC;
  var totalTracked = (c1T||0) + (c2T||0);
  var totalTC = c1TC + c2TC;
  var pct = budget > 0 ? (totalTC / budget) * 100 : 0;
  var bar = pct <= 70 ? 'good' : pct <= 95 ? 'warn' : 'bad';
  var html = '<div class="creative-row combined"><div class="creative-head">' +
    '<div class="creative-name">Combined Total</div>' +
    '<div class="creative-rate">' + fmtH(totalSet, 1) + ' allocated · ' + fmtH(totalTracked, 1) + ' tracked</div>' +
    '</div><div class="creative-grid">' +
    '<div class="creative-cell"><div class="cell-label">Set hrs</div><div class="cell-value">' + fmtH(totalSet, 1) + '</div></div>' +
    '<div class="creative-cell"><div class="cell-label">Set cost</div><div class="cell-value">' + fmt$(totalSetCost) + '</div></div>' +
    '<div class="creative-cell"><div class="cell-label">Tracked</div><div class="cell-value">' + fmtH(totalTracked, 1) + '</div></div>' +
    '<div class="creative-cell"><div class="cell-label">Tracked cost</div><div class="cell-value">' + fmt$(totalTC) + '</div></div>' +
    '</div>';
  if (budget > 0) {
    html += '<div class="progress-wrap">' +
      '<div class="progress-label"><span>Spend vs budget</span><strong>' + fmt$(totalTC) + ' / ' + fmt$(budget) + ' (' + fmtPct(pct) + ')</strong></div>' +
      '<div class="progress-bar"><div class="progress-fill ' + bar + '" style="width:' + Math.min(pct, 100) + '%"></div></div></div>';
  }
  html += '</div>';
  return html;
}

// ── Save ───────────────────────────────────────────────────
function saveField(itemId, colKey, value) {
  var colId = colMap[colKey];
  if (!colId) { toast('Column "' + colKey + '" not found', true); return; }
  clearTimeout(saveTimers[itemId + '_' + colKey]);
  saveTimers[itemId + '_' + colKey] = setTimeout(function() {
    toast('Saving…');
    updateCol(itemId, colId, value)
      .then(function() { toast('Saved'); return fetchSingleItem(itemId); })
      .then(function(raw) {
        if (!raw) return;
        var parsed = parseItem(raw);
        var idx = allItems.findIndex(function(i){ return i.id === itemId; });
        if (idx >= 0) allItems[idx] = parsed;
        renderDetail(parsed);
        renderBoard();
      })
      .catch(function(e) { console.error(e); toast('Save failed: ' + e.message, true); });
  }, 400);
}

function toast(msg, isError) {
  var t = $('save-indicator');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// ── Boot ───────────────────────────────────────────────────
function boot() {
  if (!CONFIG.apiToken || CONFIG.apiToken === 'YOUR_API_TOKEN_HERE')
    return showError('API token not set', 'Paste your monday.com API token into the CONFIG block at the top.');
  if (!CONFIG.boardId || CONFIG.boardId === 'YOUR_BOARD_ID_HERE')
    return showError('Board ID not set', 'Paste your monday.com board ID into the CONFIG block at the top.');

  setMsg('Loading columns...');
  fetchColumns()
    .then(function(cols) {
      allBoardCols = cols;
      colMap = mapCols(cols);
      console.log('[colMap]', colMap);
      setMsg('Loading jobs...');
      return fetchItems();
    })
    .then(function(items) {
      allItems = items.map(parseItem);
      $('loading').style.display = 'none';
      $('app').style.display = 'flex';
      renderBoard();
    })
    .catch(function(e) {
      console.error(e);
      showError('Failed to load', e.message || String(e));
    });
}

// ── Events ─────────────────────────────────────────────────
document.querySelectorAll('.filter-pill').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-pill').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = btn.getAttribute('data-filter');
    renderBoard();
  });
});
$('search').addEventListener('input', function(e) {
  searchTerm = e.target.value;
  renderBoard();
});
$('panel-overlay').addEventListener('click', closePanel);
$('panel-x').addEventListener('click', closePanel);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePanel();
});

window.onerror = function(msg, src, line) {
  showError('JavaScript Error', msg + ' (line ' + line + ')');
};

boot();
</script>
</body>
</html>
